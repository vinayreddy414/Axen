
<!DOCTYPE html>
<html>
<head>
    <title>Axen Empire | Mastery</title>
</head>
<body style="background: #000; color: #0f0; font-family: monospace; padding: 30px;">
    <h1>AXEN EMPIRE: MASTERY TRACKER</h1>
    
    <div style="border: 1px solid #0f0; padding: 20px; width: 350px;">
        <h3>Track Your Study</h3>
        <input type="number" id="hours" placeholder="Hours spent">
        <select id="subject">
            <option value="phys">Physical Chem</option>
            <option value="org">GOC / Organic</option>
        </select>
        <button onclick="logMastery()">Log</button>
        
        <p>Physical Chem: <span id="phys-score">0</span> hrs</p>
        <p>GOC/Organic: <span id="org-score">0</span> hrs</p>
    </div>

    <script>
        // Load data on startup
        document.getElementById('phys-score').innerText = localStorage.getItem('phys') || 0;
        document.getElementById('org-score').innerText = localStorage.getItem('org') || 0;

        function logMastery() {
            let hours = parseInt(document.getElementById('hours').value);
            let subject = document.getElementById('subject').value;
            
            let current = parseInt(localStorage.getItem(subject) || 0);
            let newTotal = current + hours;
            
            localStorage.setItem(subject, newTotal);
            document.getElementById(subject + '-score').innerText = newTotal;
        }
    </script>
</body>
</html>
