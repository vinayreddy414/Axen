<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>AXEN // EMPIRE_OS</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        .panel { border: 1px solid #00ff41; padding: 15px; margin-bottom: 20px; }
        .log { height: 150px; overflow-y: auto; background: #050505; border: 1px solid #222; padding: 10px; font-size: 0.6rem; margin-bottom: 10px; }
        input, button { width: 100%; padding: 10px; background: #000; border: 1px solid #00ff41; color: #00ff41; margin-bottom: 5px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="panel">
        <h3>COMMAND_CENTER</h3>
        <div class="log" id="log">> SYSTEM_ONLINE. DUAL_AI_SYNCED.</div>
        <input type="text" id="in" placeholder="EXECUTE_PROTOCOL">
        <button onclick="commit()">COMMIT_TO_VAULT</button>
    </div>
    <script>
        function commit() {
            const val = document.getElementById('in').value;
            document.getElementById('log').innerHTML += '<br>> ' + val;
            document.getElementById('in').value = '';
        }
    </script>
</body>
</html>
