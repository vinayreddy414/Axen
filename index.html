<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background: #000; color: #444; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 400px; padding: 20px; border: 1px solid #222; }
        
        /* Layer Headers */
        .layer-header { font-size: 0.5rem; letter-spacing: 5px; color: #00ff41; margin-bottom: 20px; }
        h1 { font-size: 2rem; color: #fff; margin: 0; }
        
        .layer-content { margin-top: 40px; }
        input { background: transparent; border: none; border-bottom: 1px solid #222; color: #fff; width: 100%; padding: 10px 0; outline: none; }
        button { background: transparent; border: 1px solid #444; color: #444; padding: 10px 20px; margin-top: 20px; cursor: pointer; transition: 0.5s; }
        button:hover { border-color: #00ff41; color: #00ff41; }
    </style>
</head>
<body>
    <div class="container">
        <div class="layer-header">LAYER_01: AUTHENTICATION // LAYER_02: INTEGRATION</div>
        <h1>AXEN</h1>
        
        <div class="layer-content">
            <form action="https://formspree.io/f/mvzdanok" method="POST">
                <input type="hidden" name="_next" value="https://axen-cb7f.vercel.app">
                
                <label style="font-size: 0.6rem;">// ORIGIN_IDENTITY</label>
                <input type="email" name="email" required>
                
                <label style="display:block; margin-top:20px; font-size: 0.6rem;">// ACCESS_PROTOCOL</label>
                <input type="text" name="protocol" placeholder="LEVEL_01_CLEARANCE" required>
                
                <button type="submit">INIT_SYNCHRONIZATION</button>
            </form>
        </div>
    </div>
</body>
</html>
