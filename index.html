<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { border: 1px solid #00ff41; padding: 40px; text-align: center; box-shadow: 0 0 15px #00ff4133; width: 300px; position: relative; }
        h1 { font-size: 1.2rem; letter-spacing: 8px; margin-bottom: 5px; }
        input { background: transparent; border: none; border-bottom: 1px solid #00ff41; color: #00ff41; width: 100%; padding: 10px 0; text-align: center; outline: none; margin-top: 20px; }
        button { background: transparent; border: 1px solid #00ff41; color: #00ff41; padding: 10px; width: 100%; margin-top: 20px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        button:hover { background: #00ff41; color: #000; }
        #data-stream { position: fixed; bottom: 10px; left: 10px; font-size: 0.6rem; color: #008f11; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AXEN</h1>
        <p style="font-size: 0.7rem;">SYSTEM // RESTRICTED</p>
        <form action="YOUR_FORMSPREE_ENDPOINT_HERE" method="POST">
            <input type="email" name="email" placeholder="ENTER_IDENTITY" required>
            <button type="submit">REQUEST_ACCESS</button>
        </form>
    </div>

    <div id="data-stream"></div>

    <script>
        const stream = document.getElementById('data-stream');
        const logs = ["INIT_CORE...", "ENCRYPTING...", "SYNC_DATA_99%", "HUB_ACTIVE", "SCANNING_NODE...", "READY"];
        setInterval(() => {
            stream.innerText = "STREAM: " + logs[Math.floor(Math.random() * logs.length)];
        }, 2000);
    </script>
</body>
</html>
