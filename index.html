<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* Base Setup */
        body { 
            background: #050505; 
            color: #00ff41; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        /* CRT Scanline Effect */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2; background-size: 100% 4px, 3px 100%; pointer-events: none;
        }

        .container { 
            border: 1px solid #00ff41; 
            padding: 40px; 
            text-align: center; 
            box-shadow: 0 0 20px #00ff4144; 
            width: 350px; 
            z-index: 1;
            background: #000;
        }

        h1 { font-size: 2rem; letter-spacing: 15px; margin-bottom: 20px; text-shadow: 0 0 10px #00ff41; }
        
        input { 
            background: transparent; border: none; border-bottom: 2px solid #00ff41; 
            color: #00ff41; width: 100%; padding: 10px 0; text-align: center; 
            font-size: 1rem; outline: none; margin-bottom: 20px; 
        }

        button { 
            background: #00ff41; border: none; color: #000; padding: 12px; 
            width: 100%; cursor: pointer; font-weight: bold; text-transform: uppercase;
            transition: all 0.3s;
        }
        button:hover { background: #fff; box-shadow: 0 0 15px #fff; }

        #footer-info { margin-top: 30px; font-size: 0.6rem; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AXEN</h1>
        <form action="https://formspree.io/f/mvzdanok" method="POST">
            <input type="hidden" name="_next" value="https://axen-two.vercel.app">
            <input type="email" name="email" placeholder="INPUT_IDENTITY_KEY" required>
            <button type="submit">INITIALIZE_ACCESS</button>
        </form>
        <div id="footer-info">
            SYSTEM_TIME: <span id="time"></span> | STATUS: SECURE
        </div>
    </div>

    <script>
        setInterval(() => {
            document.getElementById('time').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
